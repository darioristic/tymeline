name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate xcodeproj
        run: xcodegen generate

      - name: Build TymelineCore (SwiftPM)
        run: swift build

      # KeychainHelperTests write to the default login keychain. On a fresh
      # macOS runner that keychain is locked, so SecItemAdd hangs waiting for
      # a UI prompt that nobody can answer - the job sits there until the
      # workflow's 20-minute timeout. Create a throwaway keychain, mark it
      # default + unlocked, and let it auto-lock after 2h (well past the run).
      - name: Set up CI keychain
        run: |
          security create-keychain -p "" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "" ci.keychain
          security set-keychain-settings -l -u -t 7200 ci.keychain

      - name: Test TymelineCore (SwiftPM)
        run: swift test

      - name: Build app target (xcodebuild)
        run: |
          xcodebuild \
            -project tymeline.xcodeproj \
            -scheme tymeline \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
