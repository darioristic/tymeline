name: tymeline

options:
  bundleIdPrefix: app.tymeline
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  defaultConfig: Debug
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.27"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: app.tymeline
    PRODUCT_NAME: tymeline
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  TymelineCore:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  tymeline:
    type: application
    platform: macOS
    sources:
      - path: Sources/tymeline
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: TymelineCore
        product: TymelineCore
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Resources/tymeline.entitlements
        # Custom Sparkle keys (SUFeedURL, SUPublicEDKey) aren't part of
        # Xcode's INFOPLIST_KEY_* allow-list, so we ship a real Info.plist
        # instead of letting Xcode synthesize one.
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ACCENT_COLOR_NAME: AccentColor
